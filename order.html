
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Service | JR Electradrive</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #E31E24;
            --dark-bg: #121212;
            --card-bg: #1c1c1e;
            --white: #ffffff;
            --gray: #b3b3b3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark-bg);
            color: var(--white);
            line-height: 1.6;
        }

        /* HEADER */
        header {
            background: rgba(18, 18, 18, 0.98);
            border-bottom: 3px solid var(--red);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo img { height: 60px; width: auto; }

        .nav-links { display: flex; list-style: none; }
        .nav-links li { margin-left: 30px; }
        .nav-links a {
            text-decoration: none;
            color: var(--white);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* ORDER FORM CONTAINER */
        .order-section {
            padding: 140px 10% 80px;
            max-width: 800px;
            margin: 0 auto;
        }

        .order-section h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            text-align: center;
        }

        .order-section p {
            text-align: center;
            color: var(--gray);
            margin-bottom: 40px;
        }

        form {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 8px;
            border-top: 5px solid var(--red);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--red);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: white;
            font-family: 'Montserrat', sans-serif;
            border-radius: 4px;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--red);
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: var(--red);
            color: white;
            border: none;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: white;
            color: var(--red);
        }

        /* FOOTER STRIPE */
        .slanted-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: var(--red);
            clip-path: polygon(0 85%, 100% 0, 100% 100%, 0% 100%);
            z-index: -1;
        }

        @media (max-width: 600px) {
            .order-section { padding-top: 120px; }
            form { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo"><img src="e57fb09b-db12-4a2b-b3ca-77a7db54df98.png" alt="JR ELECTRADRIVE"></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li><a href="order.html" style="color: var(--red);">Book Service</a></li>
            </ul>
        </nav>
    </header>

    <main class="order-section">
        <h1>BOOK A <span style="color: var(--red);">SERVICE</span></h1>
        <p>Complete the details below to send an instant request to our specialists.</p>

        <form id="whatsappForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Your Name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="yourname@gmail.com" required>
            </div>

            <div class="form-group">
                <label>Location</label>
                <input type="text" id="location" placeholder="e.g. Harare CBD, Greendale" required>
            </div>

            <div class="form-group">
                <label>Vehicle Type & Brand</label>
                <div style="display: flex; gap: 10px;">
                    <select id="vehicleType" style="flex: 1;">
                        <option value="Motor Vehicle">Motor Vehicle</option>
                        <option value="Truck">Truck</option>
                        <option value="Motorcycle">Motorcycle</option>
                    </select>
                    <input type="text" id="brand" placeholder="e.g. Isuzu, Mercedes" style="flex: 1;" required>
                </div>
            </div>

            <div class="form-group">
                <label>Service Required</label>
                <select id="service">
                    <option value="Diagnostics">Electrical Diagnostics</option>
                    <option value="Wiring/Harness">Wiring & Harness Repair</option>
                    <option value="Alternator/Starter">Alternator & Starter Repair</option>
                    <option value="Battery/Charging">Battery & Charging Systems</option>
                    <option value="Other">Other Electrical Fault</option>
                </select>
            </div>

            <div class="form-group">
                <label>Describe the Fault</label>
                <textarea id="fault" placeholder="Please describe what is happening with the vehicle..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Send to WhatsApp</button>
        </form>
    </main>

    <div class="slanted-bg"></div>

    <script>
        document.getElementById('whatsappForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Collect Data
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const loc = document.getElementById('location').value;
            const vType = document.getElementById('vehicleType').value;
            const brand = document.getElementById('brand').value;
            const service = document.getElementById('service').value;
            const fault = document.getElementById('fault').value || "No description provided";

            const phoneNumber = "263787747619"; 
            
            // Format for WhatsApp
            const message = `*NEW SERVICE ORDER*%0A` +
                            `--------------------------%0A` +
                            `*Name:* ${name}%0A` +
                            `*Email:* ${email}%0A` +
                            `*Location:* ${loc}%0A` +
                            `*Vehicle:* ${vType} (${brand})%0A` +
                            `*Service:* ${service}%0A` +
                            `*Fault Description:* ${fault}%0A` +
                            `--------------------------`;

            window.open(`https://wa.me/${phoneNumber}?text=${message}`, '_blank');
        });
    </script>

</body>
</html>
